

services:

  server:
    build: ./server

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env

    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client

    ports:
      - "5173:5173"

    env_file:
      - ./client/.env

    volumes:
      - ./client:/app
      - /app/node_modules

    depends_on:
      - server